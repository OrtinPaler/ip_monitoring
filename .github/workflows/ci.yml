name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ip_monitoring_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.1
          bundler-cache: true

      - name: Setup database
        env:
          RACK_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ip_monitoring_test
        run: bundle exec rake db:migrate

      - name: Run tests
        env:
          RACK_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ip_monitoring_test
          REDIS_URL: redis://localhost:6379/0
        run: bundle exec rspec
